services:
  - type: web
    name: bizflow-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bizflow-database
          property: connectionString
    rootDir: backend

  - type: web
    name: bizflow-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: npm install && CI=false npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: bizflow-backend
          type: web
          property: host
      - key: CI
        value: false
    rootDir: frontend

databases:
  - name: bizflow-database
    plan: free
    region: oregon
    databaseName: bizflow
    user: bizflow_user
